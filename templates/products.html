{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2>All Products</h2>

    <div class="products">
        {% for product in products %}
            <div class="card">

                {% if product.image %}
                    <img src="{{ product.image.url }}">
                {% endif %}

                <h3>{{ product.name }}</h3>
                <p>₹ {{ product.price }}</p>

                <a href="{% url 'product_detail' product.id %}">
                    <button class="btn-view">View Details</button>
                </a>
                <a href="{% url 'add_to_cart' product.id %}">
                    <button class="btn-cart">Add to Cart</button>
                </a>

            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
